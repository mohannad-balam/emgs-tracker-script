name: EMGS Tracker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: emgs-tracker
  cancel-in-progress: false

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data directory exists
        run: |
          mkdir -p data
          test -f data/visa_tracker_state.json || echo "{}" > data/visa_tracker_state.json

      - name: Run tracker
        env:
          RUN_ONCE: "true"
          STATE_FILE: "data/visa_tracker_state.json"

          CHECK_INTERVAL_MINUTES: "30"
          ALWAYS_EMAIL: ${{ secrets.ALWAYS_EMAIL }}
          REQUEST_TIMEOUT: ${{ secrets.REQUEST_TIMEOUT }}

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
          EMAIL_SUBJECT_PREFIX: ${{ secrets.EMAIL_SUBJECT_PREFIX }}

          PASSPORTS: ${{ secrets.PASSPORTS }}
          EMAILS: ${{ secrets.EMAILS }}
          NATIONALITY: ${{ secrets.NATIONALITY }}

          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          LOG_REQUEST_RESPONSE: ${{ secrets.LOG_REQUEST_RESPONSE }}

          DAILY_SUMMARY_ENABLED: ${{ secrets.DAILY_SUMMARY_ENABLED }}
          DAILY_SUMMARY_HOUR: ${{ secrets.DAILY_SUMMARY_HOUR }}
          DAILY_SUMMARY_MINUTE: ${{ secrets.DAILY_SUMMARY_MINUTE }}
          TIMEZONE: ${{ secrets.TIMEZONE }}

          ERROR_NOTIFY_ENABLED: ${{ secrets.ERROR_NOTIFY_ENABLED }}
          ERROR_NOTIFY_AFTER_CONSECUTIVE_FAILURES: ${{ secrets.ERROR_NOTIFY_AFTER_CONSECUTIVE_FAILURES }}
          ERROR_NOTIFY_COOLDOWN_HOURS: ${{ secrets.ERROR_NOTIFY_COOLDOWN_HOURS }}
        run: python -m app.main

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/visa_tracker_state.json

          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi

          git commit -m "Update tracker state"

          git pull --rebase origin "${GITHUB_REF_NAME}" || {
            echo "Rebase failed, aborting rebase and retrying with fresh pull"
            git rebase --abort || true
            git pull --rebase origin "${GITHUB_REF_NAME}"
          }

          git push origin "HEAD:${GITHUB_REF_NAME}"